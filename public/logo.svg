<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 90" fill="none">
  <!-- Car body outline -->
  <rect x="10" y="50" width="180" height="22" rx="6" stroke="#888" stroke-width="2.5" fill="none"/>

  <!-- Roof / cabin -->
  <path d="M45 50 L60 20 L140 20 L160 50" stroke="#888" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Windshield -->
  <path d="M62 22 L50 50" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M138 22 L152 50" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- B-pillar -->
  <line x1="100" y1="22" x2="100" y2="50" stroke="#aaa" stroke-width="1.5"/>

  <!-- Front bumper extension -->
  <path d="M190 60 L195 72" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <!-- Rear bumper extension -->
  <path d="M10 60 L5 72" stroke="#888" stroke-width="2" stroke-linecap="round"/>

  <!-- Grille accent line (front) -->
  <line x1="185" y1="55" x2="185" y2="65" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Front wheel arch -->
  <path d="M155 72 Q155 50 168 50 Q181 50 181 72" stroke="#888" stroke-width="2.5" fill="none"/>
  <!-- Front wheel -->
  <circle cx="168" cy="72" r="13" stroke="#888" stroke-width="2.5" fill="none"/>
  <circle cx="168" cy="72" r="5" stroke="#aaa" stroke-width="1.5" fill="none"/>

  <!-- Rear wheel arch -->
  <path d="M25 72 Q25 50 38 50 Q51 50 51 72" stroke="#888" stroke-width="2.5" fill="none"/>
  <!-- Rear wheel -->
  <circle cx="38" cy="72" r="13" stroke="#888" stroke-width="2.5" fill="none"/>
  <circle cx="38" cy="72" r="5" stroke="#aaa" stroke-width="1.5" fill="none"/>

  <!-- Door line -->
  <line x1="55" y1="50" x2="55" y2="70" stroke="#bbb" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="145" y1="50" x2="145" y2="70" stroke="#bbb" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Door handle (rear) -->
  <rect x="70" y="56" width="16" height="4" rx="2" stroke="#aaa" stroke-width="1.2" fill="none"/>
  <!-- Door handle (front) -->
  <rect x="115" y="56" width="16" height="4" rx="2" stroke="#aaa" stroke-width="1.2" fill="none"/>

  <!-- Headlight -->
  <rect x="183" y="52" width="8" height="6" rx="2" fill="#c0392b" opacity="0.8"/>

  <!-- Tail light -->
  <rect x="9" y="52" width="8" height="6" rx="2" fill="#c0392b" opacity="0.6"/>
</svg>
